<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#137a4a">
<meta name="description" content="Bilingual agrochemical tank-mix calculator and spray-application logger. Works offline.">
<title>农药记录 · ChemLogger</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.webmanifest">

<!-- icons -->
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">

<!-- Apple iOS home-screen support -->
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ChemLogger">
<style>
:root{
  --bg:#f4f6f2; --panel:#ffffff; --panel2:#eef2ea; --line:#c9d4c6;
  --ink:#122117; --dim:#4a6152; --dim2:#6b8072;
  --accent:#137a4a; --accent-ink:#ffffff; --amber:#9a6b00; --red:#b3261e;
  --r:14px; --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC",system-ui,sans-serif;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 20px) env(safe-area-inset-left);
  line-height:1.45;
}
.wrap{max-width:680px;margin:0 auto;padding:0 16px}
header{
  padding:18px 0 12px; position:sticky; top:0; z-index:20;
  background:linear-gradient(180deg,var(--bg) 72%,transparent);
}
.hrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.brand h1{font-size:19px;margin:0;letter-spacing:.2px;font-weight:650}
.lang{
  border:1px solid var(--line);background:var(--panel);color:var(--dim);
  border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;
}
.lang:active{transform:scale(.96)}
.hbtns{display:flex;align-items:center;gap:8px}
.icon-btn{border:1px solid var(--line);background:var(--panel);color:var(--dim);
  width:38px;height:38px;border-radius:999px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex:none}
.icon-btn:active{transform:scale(.94)}

/* full-screen settings panel */
.panel{position:fixed;inset:0;z-index:90;background:var(--bg);overflow-y:auto;
  padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px);
  animation:panelIn .2s ease}
@keyframes panelIn{from{transform:translateX(6%);opacity:.4}to{transform:translateX(0);opacity:1}}
.panel-head{display:flex;align-items:center;gap:10px;padding:14px 16px;position:sticky;top:0;
  background:var(--bg);border-bottom:1px solid var(--line);z-index:2}
.panel-head h2{margin:0;font-size:18px;font-weight:650;flex:1}
.panel-body{max-width:680px;margin:0 auto;padding:16px}
.setting-sec{margin-bottom:26px}
.sec-h{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1.4px;
  font-weight:700;margin-bottom:10px}
.add-row{display:flex;gap:8px;margin-bottom:10px}
.ent-add{flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  border-radius:11px;padding:13px 13px;font-size:16px}
.ent-add:focus{outline:none;border-color:var(--accent)}
.ent-addbtn{flex:none;width:50px;border:1px solid var(--accent);background:var(--accent);color:#fff;
  border-radius:11px;font-size:24px;font-weight:600;cursor:pointer;min-height:48px}
.ent-addbtn:active{transform:scale(.96)}
.ent-list{display:flex;flex-direction:column;gap:8px}
.ent-row{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:4px 4px 4px 13px;box-shadow:0 1px 2px rgba(18,33,23,.04)}
.ent-name{flex:1;min-width:0;background:transparent;border:none;color:var(--ink);
  font-size:16px;font-weight:500;padding:11px 0}
.ent-name:focus{outline:none}
.ent-del{flex:none;border:1px solid var(--line);background:transparent;color:var(--dim);
  width:42px;height:42px;border-radius:10px;font-size:16px;cursor:pointer}
.ent-del:active{background:var(--panel2)}
.ent-empty{color:var(--dim2);font-size:13px;padding:6px 2px}
/* worker sid + name + import */
.import-btn{border:1px solid var(--accent);background:transparent;color:var(--accent);
  border-radius:8px;padding:6px 12px;font-size:12px;font-weight:650;cursor:pointer;text-transform:none;letter-spacing:0}
.import-btn:active{background:rgba(19,122,74,.08)}
.import-hint{font-size:12px;margin:2px 2px 8px;min-height:15px;line-height:1.4}
.import-hint.ok{color:var(--accent)}.import-hint.err{color:var(--red)}
.import-fmt{font-size:11px;color:var(--dim2);margin:0 2px 8px;line-height:1.4}
.worker-add{display:flex;gap:8px;margin-bottom:4px}
.w-sid{width:6.5em;min-width:6.5em;flex:none;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  border-radius:11px;padding:13px 12px;font-size:16px;font-family:var(--mono);text-align:center;text-transform:uppercase}
.w-sid:focus{outline:none;border-color:var(--accent)}
.w-sid.dupe{border-color:var(--red);background:rgba(179,38,30,.06)}
.worker-row{gap:8px;padding-left:4px}
.worker-row .w-sid{border-radius:8px;padding:11px 8px}
/* trash */
.trash-h{display:flex;align-items:center;justify-content:space-between}
.trash-purgeall{border:1px solid var(--red);background:transparent;color:var(--red);
  border-radius:8px;padding:6px 12px;font-size:12px;font-weight:650;cursor:pointer;text-transform:none;letter-spacing:0}
.trash-purgeall:active{background:rgba(179,38,30,.08)}
.trash-row{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:10px 10px 10px 13px;box-shadow:0 1px 2px rgba(18,33,23,.04)}
.trash-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.trash-type{display:inline-block;align-self:flex-start;font-size:11px;font-weight:700;
  padding:2px 8px;border-radius:999px;background:var(--panel2);color:var(--dim)}
.ttype-farm{background:#e6f0e6;color:var(--accent)}
.trash-label{font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trash-acts{display:flex;align-items:center;gap:7px;flex:none}
.trash-restore{border:1px solid var(--accent);background:var(--accent);color:#fff;
  border-radius:9px;padding:9px 14px;font-size:14px;font-weight:650;cursor:pointer;min-height:42px}
.trash-restore:active{transform:scale(.96)}
.trash-purge{flex:none;border:1px solid var(--line);background:transparent;color:var(--dim2);
  width:42px;height:42px;border-radius:10px;font-size:16px;cursor:pointer}
.trash-purge:active{background:var(--panel2)}
/* farm card with nested zones */
.farm-card{background:var(--panel);border:1px solid var(--line);border-radius:13px;
  padding:8px;margin-bottom:9px;box-shadow:0 1px 2px rgba(18,33,23,.04)}
.farm-row{border:none;box-shadow:none;background:transparent;padding:2px 2px 2px 9px}
.farm-row .ent-name{font-size:16px;font-weight:650}
.zones{margin:4px 4px 2px;padding-left:10px;border-left:2px solid var(--line)}
.zone-toggle{display:flex;align-items:center;gap:10px;width:100%;background:transparent;
  border:none;padding:12px 4px;cursor:pointer;color:var(--accent);font-size:15px;font-weight:700;text-align:left}
.ztg-caret{flex:none;display:flex;align-items:center;justify-content:center;width:28px;height:28px;
  transition:transform .15s ease}
.ztg-caret svg{width:24px;height:24px}
.zone-toggle.open .ztg-caret{transform:rotate(90deg)}
.zone-rows{max-height:280px;overflow-y:auto;margin-bottom:2px}
.zone-rows[hidden]{display:none}
.zone-row{display:flex;flex-direction:column;gap:4px;padding:7px 0}
.zone-main{display:flex;align-items:center;gap:8px}
.zone-caret{flex:none;width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;color:var(--accent);cursor:pointer;padding:0}
.zone-caret svg{width:22px;height:22px;transition:transform .15s}
.zone-caret.open svg{transform:rotate(90deg)}
.zone-name{width:100%;background:transparent;border:none;color:var(--ink);font-size:16px;font-weight:600;padding:2px 0}
.zone-name:focus{outline:none;border-bottom:1px solid var(--accent)}
.zone-idblock{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.zone-sum{font-size:12px;color:var(--dim2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.zone-detail{margin-top:2px}
.zone-del{flex:none;border:1px solid var(--line);background:transparent;color:var(--dim2);
  width:42px;height:42px;border-radius:10px;font-size:16px;cursor:pointer}
.zone-trees{display:flex;align-items:center;gap:8px;padding-left:14px;flex-wrap:wrap}
.zt-lab{font-size:14px;color:var(--dim2);flex:none}
.zt-from,.zt-to{width:3.8em;min-width:3.8em;text-align:center;background:var(--panel2);
  border:1px solid var(--line);border-radius:9px;padding:11px 6px;font-size:16px;font-family:var(--mono);color:var(--ink)}
.zt-from:focus,.zt-to:focus{outline:none;border-color:var(--accent)}
.zt-dash{color:var(--dim2);font-size:15px}
.zt-count{font-size:14px;color:var(--accent);font-weight:600;margin-left:2px}
.zt-count.err{color:var(--red)}
.rows-toggle{display:flex;align-items:center;gap:5px;font-size:14px;color:var(--dim);
  font-weight:600;flex:none;cursor:pointer;white-space:nowrap;padding:6px 2px}
.rows-toggle input{accent-color:var(--accent);width:20px;height:20px}
.rows-sec{padding-left:13px;margin-top:4px}
.rows-total{font-size:13px;color:var(--accent);font-weight:650;margin-bottom:7px}
.row-list{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;margin-bottom:8px}
.row-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
.row-name{width:4.4em;min-width:4.4em;flex:none;background:var(--panel);border:1px solid var(--line);
  border-radius:8px;padding:10px 6px;font-size:16px;font-weight:650;color:var(--ink);text-align:center}
.row-name:focus{outline:none;border-color:var(--accent)}
.rt-from,.rt-to{width:3.8em;min-width:3.8em;flex:none;text-align:center;background:var(--panel);
  border:1px solid var(--line);border-radius:8px;padding:11px 6px;font-size:16px;font-family:var(--mono);color:var(--ink)}
.rt-from:focus,.rt-to:focus{outline:none;border-color:var(--accent)}
.rt-count{font-size:14px;color:var(--accent);font-weight:600;flex:1;min-width:60px}
.rt-count.err{color:var(--red)}
.row-del{flex:none;margin-left:auto;border:1px solid var(--line);background:transparent;color:var(--dim2);
  width:42px;height:42px;border-radius:10px;font-size:16px;cursor:pointer}
.row-gen-row{display:flex;gap:8px}
.row-add-row{display:flex;gap:8px;margin-bottom:8px}
.row-add{flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  border-radius:10px;padding:12px 12px;font-size:15px}
.row-add:focus{outline:none;border-color:var(--accent)}
.row-addbtn{flex:none;width:46px;border:1px solid var(--line);background:var(--panel2);color:var(--accent);
  border-radius:10px;font-size:20px;font-weight:600;cursor:pointer}
.row-addbtn:active{transform:scale(.95)}
.row-gen{flex:1;min-width:0;background:var(--panel);border:1px dashed var(--line);color:var(--ink);
  border-radius:10px;padding:12px 12px;font-size:14px}
.row-gen:focus{outline:none;border-color:var(--accent)}
.row-genbtn{flex:none;border:1px solid var(--accent);background:transparent;color:var(--accent);
  border-radius:10px;padding:0 16px;font-size:14px;font-weight:650;cursor:pointer;min-height:46px}
.row-gen-hint{font-size:12px;margin:5px 2px 0;min-height:15px;line-height:1.3}
.row-gen-hint.ok{color:var(--accent)}.row-gen-hint.err{color:var(--red)}
.zone-empty{color:var(--dim2);font-size:13px;padding:6px 0 7px}
.zone-add-row{display:flex;gap:8px;margin-top:6px}
.zone-add{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:10px;padding:12px 12px;font-size:15px}
.zone-add:focus{outline:none;border-color:var(--accent)}
.zone-addbtn{flex:none;width:46px;border:1px solid var(--line);background:var(--panel2);color:var(--accent);
  border-radius:10px;font-size:22px;font-weight:600;cursor:pointer;min-height:46px}
.zone-addbtn:active{transform:scale(.95)}
.zone-gen-row{display:flex;gap:8px;margin-top:7px}
.zone-gen{flex:1;min-width:0;background:var(--panel);border:1px dashed var(--line);color:var(--ink);
  border-radius:10px;padding:12px 12px;font-size:14px}
.zone-gen:focus{outline:none;border-color:var(--accent)}
.zone-genbtn{flex:none;border:1px solid var(--accent);background:transparent;color:var(--accent);
  border-radius:10px;padding:0 16px;font-size:14px;font-weight:650;cursor:pointer;white-space:nowrap;min-height:46px}
.zone-genbtn:active{transform:scale(.96)}
.zone-gen-hint{font-size:12px;margin:5px 2px 0;min-height:15px;line-height:1.4}
.zone-gen-hint.ok{color:var(--accent)}
.zone-gen-hint.err{color:var(--red)}

/* tank capacity */
.vol-lbl{font-size:12px;color:var(--dim);letter-spacing:1.4px;margin:16px 0 8px;font-weight:700}
.tank-in{display:flex;gap:10px;align-items:center;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:6px 16px 6px 6px;box-shadow:0 1px 2px rgba(18,33,23,.05)}
.tank-in input{
  flex:1;min-width:0;background:transparent;border:none;color:var(--ink);
  border-radius:10px;padding:14px 12px;font-size:26px;font-weight:700;
  font-family:var(--mono);width:100%;
}
.tank-in input:focus{outline:none}
.tank-in span{color:var(--dim);font-size:18px;font-weight:700;flex:none}

/* chemical cards */
.section-head{display:flex;align-items:center;justify-content:space-between;margin:22px 0 10px}
.section-head h2{font-size:15px;margin:0;font-weight:650}
.count{color:var(--dim);font-size:12px;font-family:var(--mono)}
.chem{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:13px;margin-bottom:10px;box-shadow:0 1px 2px rgba(18,33,23,.05);
}
.chem-top{display:flex;gap:9px;align-items:center;margin-bottom:11px}
.chem-name{
  flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:10px;padding:10px 12px;font-size:15px;font-weight:600;
}
.chem-name::placeholder{color:var(--dim2);font-weight:400}
.del{
  border:1px solid var(--line);background:transparent;color:var(--dim);
  width:38px;height:38px;border-radius:10px;font-size:18px;cursor:pointer;flex:none;
}
.del:active{background:var(--panel2)}
/* packaging row */
.pack-row{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.pack-lab{font-size:13px;color:var(--dim);font-weight:600;flex:none}
.pack-in{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:10px;padding:9px 12px;font-size:14px;font-family:var(--mono)}
.pack-in::placeholder{color:var(--dim2);font-weight:400;font-family:-apple-system,system-ui,sans-serif;font-size:12px}
.pack-in:focus{outline:none;border-color:var(--accent)}
.result .packs{display:block;text-align:right;font-size:14px;color:var(--ink);margin-top:5px;font-weight:600}
.result .packs b{color:var(--accent);font-family:var(--mono);font-size:16px}
.pack-warn{color:var(--red);font-size:12px;font-weight:600}
.need-pack{color:var(--amber);font-size:14px;font-weight:600;font-family:-apple-system,system-ui,sans-serif}
/* liquid/powder + mode segments */
.seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;padding:3px;gap:2px;flex:none}
.seg button{border:none;background:transparent;color:var(--dim);font-weight:700;
  font-size:14px;padding:9px 14px;border-radius:7px;font-family:inherit;cursor:pointer;white-space:nowrap}
.seg button.on{background:var(--accent);color:var(--accent-ink)}
.seg button:active{transform:scale(.97)}
.type-seg{margin-bottom:9px}
.mode-seg{display:flex;width:100%;margin-bottom:9px}
.mode-seg button{flex:1 1 0;min-width:0;padding:11px 8px;font-size:14px;font-weight:600;text-align:center;
  background:transparent;color:var(--dim);border:1.5px solid transparent}
.mode-seg button.on{background:var(--panel);color:var(--accent);
  border:1.5px solid var(--accent);box-shadow:0 1px 2px rgba(18,33,23,.06)}

/* rate line: [amount] [g|kg] per [N] L  — reads like the label */
.rate-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
.rate-line:focus-within{border-color:var(--accent)}
.rate-line.locked{opacity:.55}
.rate-in.amt{flex:0 1 4.5em;min-width:3.5em;background:var(--panel);border:1px solid var(--line);
  border-radius:8px;padding:11px 8px;font-size:18px;font-weight:700;font-family:var(--mono);text-align:center;color:var(--ink)}
.rate-in.amt:focus{outline:none;border-color:var(--accent)}
.unit-seg{display:flex;flex:none;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--panel)}
.unit-btn{border:none;background:transparent;color:var(--dim);padding:11px 12px;font-size:15px;font-weight:650;
  font-family:var(--mono);cursor:pointer;border-right:1px solid var(--line)}
.unit-btn:last-child{border-right:none}
.unit-btn.on{background:var(--accent);color:#fff}
.rate-per{color:var(--dim);font-size:14px;flex:none}
.basis-in{flex:0 1 4em;min-width:3em;text-align:center;background:var(--panel);border:1px solid var(--line);
  border-radius:8px;padding:11px 8px;font-size:18px;font-weight:700;font-family:var(--mono);color:var(--ink)}
.basis-in:focus{outline:none;border-color:var(--accent)}
.rate-perL{color:var(--dim);font-size:15px;font-weight:650;font-family:var(--mono);flex:none}

.rate-wrap{display:flex;align-items:center;
  background:var(--panel2);border:1px solid var(--line);border-radius:10px}
.rate-wrap:focus-within{border-color:var(--accent)}
.rate-in{
  flex:1;min-width:0;background:transparent;border:none;color:var(--ink);
  border-radius:10px;padding:13px 14px;font-size:18px;font-weight:600;font-family:var(--mono);width:100%;
}
.rate-in:focus{outline:none}
.rate-pre{color:var(--dim);font-size:18px;font-weight:700;font-family:var(--mono);padding:0 2px 0 12px;flex:none}
.rate-in.ratio{padding-left:6px}
.chem-name:focus,.tank-in:focus-within{outline:none;border-color:var(--accent)}
.rate-wrap.locked{opacity:.55}
.rate-in:disabled{cursor:not-allowed;color:var(--dim2)}
.result{
  margin-top:11px;padding:12px 14px;background:var(--panel2);border-radius:10px;
  display:flex;align-items:baseline;justify-content:space-between;gap:10px;
  border:1px dashed var(--line);
}
.result .lab{font-size:12px;color:var(--dim)}
.result .val{font-size:27px;font-weight:800;font-family:var(--mono);color:var(--accent);line-height:1}
.result .val small{font-size:15px;font-weight:700}
.result .val.warn{color:var(--amber)}
.result .val.bad{color:var(--red)}
.result .sub{font-size:11px;color:var(--dim2);display:block;text-align:right;font-family:var(--mono);margin-top:4px}

.add{
  width:100%;border:1px dashed var(--line);background:transparent;color:var(--accent);
  border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:2px;
}
.add:active{background:var(--panel)}

/* summary */
.summary{
  background:linear-gradient(160deg,#e6f0e6,#ffffff);
  border:1px solid #b5c8b3;border-radius:var(--r);padding:16px;margin-top:20px;
  box-shadow:0 1px 3px rgba(18,33,23,.06);
}
.summary h3{margin:0 0 12px;font-size:14px;font-weight:650;display:flex;justify-content:space-between}
.summary h3 span{color:var(--dim);font-family:var(--mono);font-weight:600}
.srow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.srow:last-of-type{border-bottom:none}
.srow .q{font-family:var(--mono);font-weight:700}
.srow.water .q{color:var(--accent)}
.srow.tot{margin-top:6px;padding-top:12px;border-top:1px solid var(--line);border-bottom:none;font-weight:600}
.actions{display:flex;gap:8px;margin-top:14px}
.actions button{
  flex:1;border-radius:11px;padding:13px;font-size:14px;font-weight:650;cursor:pointer;border:1px solid var(--line);
}
.btn-share{background:#25D366;color:#fff;border-color:#25D366;
  display:flex;align-items:center;justify-content:center;gap:8px}
.btn-share:active{background:#1EBE5A;border-color:#1EBE5A}
.btn-reset{background:transparent;color:var(--dim)}
.actions button:active{transform:scale(.98)}
.err{color:var(--red);font-size:12px;margin-top:6px;display:none}
.err.show{display:block}

/* share preview modal */
.modal-ov{position:fixed;inset:0;background:rgba(10,20,14,.55);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));
  animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:560px;background:var(--panel);border:1px solid var(--line);
  border-radius:18px;padding:16px;box-shadow:0 12px 40px rgba(10,20,14,.3);
  animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(16px);opacity:.6}to{transform:translateY(0);opacity:1}}
.modal-h{font-size:15px;font-weight:650;color:var(--ink);margin-bottom:11px}
.modal-ta{width:100%;min-height:190px;resize:vertical;background:var(--panel2);
  border:1px solid var(--line);border-radius:12px;padding:13px;color:var(--ink);
  font-size:14px;line-height:1.5;font-family:var(--mono);-webkit-appearance:none}
.modal-ta:focus{outline:none;border-color:var(--accent)}
.modal-btns{display:flex;gap:9px;margin-top:13px}
.modal-btns button{flex:1;border-radius:12px;padding:14px;font-size:15px;font-weight:650;
  cursor:pointer;border:1px solid var(--line)}
.modal-cancel{background:transparent;color:var(--dim)}
.modal-send{background:#25D366;color:#fff;border-color:#25D366;
  display:flex;align-items:center;justify-content:center;gap:8px}
.modal-send:active{background:#1EBE5A;border-color:#1EBE5A}
.wa-ico{flex:none}
.modal-btns button:active{transform:scale(.98)}
/* confirm dialog */
.modal-ov[hidden]{display:none!important}
#confirmModal{align-items:center}
.confirm-modal{max-width:400px}
.confirm-modal .modal-h{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:4px}
.confirm-yes.danger{background:var(--red);border-color:var(--red);color:#fff}
.confirm-yes.danger:active{background:#8f1e17;border-color:#8f1e17}

/* log button + history on home */
.log-actions{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.btn-log{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--accent);color:#fff;border:1px solid var(--accent);border-radius:13px;
  padding:16px;font-size:16px;font-weight:700;cursor:pointer}
.btn-log:active{transform:scale(.98);background:#0f6a40}
.btn-history{width:100%;background:var(--panel);color:var(--dim);border:1px solid var(--line);
  border-radius:13px;padding:14px;font-size:15px;font-weight:650;cursor:pointer}
.btn-history:active{background:var(--panel2)}

/* log sheet */
.modal-ov[hidden]{display:none!important}
.log-modal{max-width:560px}
.log-body{max-height:60vh;overflow-y:auto;padding:2px}
.log-lab{display:block;font-size:13px;font-weight:700;color:var(--dim);margin:14px 2px 7px}
.log-req{color:var(--red)}
.log-in{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:11px;padding:13px 12px;font-size:16px}
.log-in:focus{outline:none;border-color:var(--accent)}
.log-empty{color:var(--dim2);font-size:13px;padding:5px 2px}
.log-addtarget{width:100%;border:1px dashed var(--accent);background:transparent;color:var(--accent);
  border-radius:11px;padding:12px;font-size:14px;font-weight:650;cursor:pointer;margin-top:8px}
.log-addtarget:active{background:rgba(19,122,74,.06)}
.target-chip{display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:6px}
.target-chip span{font-size:14px;color:var(--ink);word-break:break-word}
.target-chip button{flex:none;border:none;background:transparent;color:var(--dim2);font-size:16px;cursor:pointer;padding:2px 6px}
.chip-wrap{display:flex;flex-wrap:wrap;gap:7px}
.chip{border:1px solid var(--line);background:var(--panel);color:var(--dim);border-radius:999px;
  padding:9px 14px;font-size:14px;font-weight:600;cursor:pointer}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip:active{transform:scale(.96)}
.wk-selected{margin-bottom:9px}
.wk-search{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:11px;padding:12px 13px;font-size:16px;margin-bottom:8px}
.wk-search:focus{outline:none;border-color:var(--accent)}
.wk-list{max-height:240px;overflow-y:auto;border:1px solid var(--line);border-radius:11px;background:var(--panel)}
.wk-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;
  border:none;border-bottom:1px solid var(--line);padding:12px 13px;font-size:15px;color:var(--ink);cursor:pointer}
.wk-item:last-child{border-bottom:none}
.wk-item.on{background:rgba(19,122,74,.07);color:var(--accent);font-weight:650}
.wk-item:active{background:var(--panel2)}
.wk-check{flex:none;width:18px;color:var(--accent);font-weight:700}
.log-mix{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.log-mix .mix-tank{font-size:13px;color:var(--dim);font-weight:650;margin-bottom:5px}
.log-mix .mix-line{font-size:14px;color:var(--ink);padding:2px 0}
.log-save{background:var(--accent);border-color:var(--accent)}
.log-save:active{background:#0f6a40;border-color:#0f6a40}
.shake{animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* target picker */
.tp-farm{margin-bottom:14px}
.tp-farm-h{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:7px}
.tp-opt{display:block;width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);
  color:var(--ink);border-radius:10px;padding:12px 13px;font-size:15px;cursor:pointer;margin-bottom:6px}
.tp-opt:active{background:var(--panel2)}
.tp-farmopt{border-color:var(--accent);color:var(--accent);font-weight:650}
.tp-zone{padding-left:12px;border-left:2px solid var(--line);margin-left:2px}
.tp-row{font-size:14px;color:var(--dim);padding:10px 12px}
.tp-crumb{display:flex;align-items:center;flex-wrap:wrap;gap:2px;margin:2px 2px 12px;font-size:13px}
.crumb{background:transparent;border:none;color:var(--accent);font-weight:650;font-size:13px;cursor:pointer;padding:4px 4px}
.crumb.cur{color:var(--ink);cursor:default}
.crumb-sep{color:var(--dim2);font-size:13px}
.tp-drill{display:flex;align-items:center;justify-content:space-between}
.tp-drill::after{content:"›";color:var(--dim2);font-size:18px;font-weight:700;margin-left:8px}
.tp-drillrow{display:flex;gap:8px;margin-bottom:6px}
.tp-drillrow .tp-opt{flex:1;margin-bottom:0}
.tp-into{flex:none;width:52px;text-align:center;font-size:20px;font-weight:700;color:var(--dim);
  display:flex;align-items:center;justify-content:center}
.tp-scope{font-size:14px;font-weight:650;color:var(--ink);margin:2px 2px 10px}
.tp-hint{font-size:12px;color:var(--dim2);margin:8px 2px 4px}
.tp-drill{display:flex;align-items:center;justify-content:space-between}
.tp-drill::after{content:"›";color:var(--dim2);font-size:18px;font-weight:700;margin-left:8px}
.tp-multi.on{border-color:var(--accent);background:rgba(19,122,74,.08);color:var(--accent);font-weight:650}
.tp-mslist{max-height:44vh;overflow-y:auto}
.tp-donebar{position:sticky;bottom:0;display:flex;align-items:center;gap:9px;
  background:var(--panel);padding:10px 2px 2px;margin-top:8px;border-top:1px solid var(--line)}
.tp-donecount{flex:1;font-size:13px;color:var(--dim);font-weight:600}
.tp-back{flex:none;border:1px solid var(--line);background:transparent;color:var(--dim);
  border-radius:10px;padding:11px 14px;font-size:14px;font-weight:600;cursor:pointer}
.tp-done{flex:none;border:1px solid var(--accent);background:var(--accent);color:#fff;
  border-radius:10px;padding:11px 20px;font-size:15px;font-weight:700;cursor:pointer}
.tp-done:active,.tp-back:active{transform:scale(.97)}
.tp-trees{display:flex;align-items:center;gap:7px;padding:6px 12px 10px;flex-wrap:wrap}
.tp-trees .zt-lab{font-size:13px;color:var(--dim2)}
.tp-tf,.tp-tt{width:3.6em;min-width:3.6em;text-align:center;background:var(--panel);border:1px solid var(--line);
  border-radius:8px;padding:10px 5px;font-size:16px;font-family:var(--mono);color:var(--ink)}
.tp-tf:focus,.tp-tt:focus{outline:none;border-color:var(--accent)}
.tp-treebtn{flex:none;border:1px solid var(--accent);background:var(--accent);color:#fff;
  border-radius:8px;width:42px;height:42px;font-size:20px;font-weight:600;cursor:pointer}
.tp-treebtn:active{transform:scale(.95)}
.tp-trees.bad .tp-tf,.tp-trees.bad .tp-tt{border-color:var(--red)}

/* history */
.hist-card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:11px;
  box-shadow:0 1px 2px rgba(18,33,23,.04)}
.hist-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hist-when{font-size:15px;font-weight:700;color:var(--ink);font-family:var(--mono)}
.hist-del{flex:none;border:1px solid var(--line);background:transparent;color:var(--dim2);width:38px;height:38px;border-radius:9px;font-size:15px;cursor:pointer}
.hist-sec{font-size:14px;color:var(--ink);line-height:1.5;padding:4px 0;border-top:1px solid var(--line)}
.hist-k{display:inline-block;font-size:12px;font-weight:700;color:var(--dim);margin-right:4px}
.hist-sec .dim{color:var(--dim2)}
.hist-export{text-transform:none;letter-spacing:0}

/* toast */
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:600;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="hrow">
    <div class="brand">
      <h1 id="t-title">农药记录</h1>
    </div>
    <div class="hbtns">
      <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="lang" id="langBtn">EN</button>
    </div>
  </div>
</header>

<div class="vol-lbl" id="t-tank">水箱容量</div>
<div class="tank-in">
  <input type="text" id="customVol" name="tankVolume" inputmode="decimal" pattern="[0-9]*\.?[0-9]*" aria-labelledby="t-tank" aria-label="水箱容量 Tank volume">
  <span>L</span>
</div>

<div class="section-head">
  <h2 id="t-chems">药剂 · Chemicals</h2>
  <span class="count" id="chemCount"></span>
</div>
<div id="chemList"></div>
<button class="add" id="addBtn">＋ <span id="t-add">添加药剂</span></button>

<div class="summary">
  <h3><span id="t-recipe">配方总览</span></h3>
  <div id="sumRows"></div>
  <div class="actions">
    <button class="btn-reset" id="resetBtn" data-zh="清空" data-en="Reset">清空</button>
    <button class="btn-share" id="shareBtn">
      <svg class="wa-ico" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.71.306 1.263.489 1.694.625.712.227 1.36.195 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.002-5.45 4.436-9.884 9.888-9.884a9.82 9.82 0 0 1 6.988 2.896 9.83 9.83 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.412-18.297A11.82 11.82 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.88 11.88 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.82 11.82 0 0 0-3.48-8.413"/></svg>
      <span id="t-share">WhatsApp</span>
    </button>
  </div>
</div>

<div class="log-actions">
  <button class="btn-log" id="logBtn">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    <span id="t-logBtn">记录喷洒</span>
  </button>
  <button class="btn-history" id="historyBtn"><span id="t-historyBtn">记录</span></button>
</div>


</div>

<!-- full-screen settings panel -->
<div class="panel" id="settingsPanel" hidden>
  <div class="panel-head">
    <button class="icon-btn" id="settingsBack" aria-label="Back">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h2 id="t-settings">设置</h2>
  </div>
  <div class="panel-body">
    <div class="setting-sec">
      <div class="sec-h" id="t-farmsH">农场</div>
      <div class="add-row">
        <input class="ent-add" id="farmAdd" type="text" placeholder="" aria-label="Add farm name">
        <button class="ent-addbtn" id="farmAddBtn">＋</button>
      </div>
      <div class="ent-list" id="farmList"></div>
    </div>
    <div class="setting-sec">
      <div class="sec-h trash-h">
        <span id="t-workersH">工人</span>
        <button class="import-btn" id="workerImport"></button>
      </div>
      <input type="file" id="workerFile" accept=".xlsx,.xls,.csv" aria-label="Import workers file" hidden>
      <div class="worker-add">
        <input class="w-sid" name="staffId" id="workerAddSid" type="text" placeholder="" aria-label="Staff ID">
        <input class="ent-add" id="workerAdd" type="text" placeholder="" aria-label="Worker name">
        <button class="ent-addbtn" id="workerAddBtn">＋</button>
      </div>
      <div class="import-hint" id="workerImportHint"></div>
      <div class="import-fmt" id="workerFmt"></div>
      <div class="ent-list" id="workerList"></div>
    </div>
    <div class="setting-sec">
      <div class="sec-h trash-h">
        <span id="t-trashH">回收站</span>
        <button class="trash-purgeall" id="trashPurgeAll" hidden></button>
      </div>
      <div class="ent-list" id="trashList"></div>
    </div>
  </div>
</div>

<!-- Log spray event bottom sheet -->
<div class="modal-ov" id="logSheet" hidden>
  <div class="modal log-modal">
    <div class="modal-h" id="t-logTitle">记录喷洒</div>
    <div class="log-body">
      <label class="log-lab" id="t-logWhen" for="logWhen">日期与时间</label>
      <input class="log-in" id="logWhen" name="logWhen" type="datetime-local" aria-label="日期与时间 Date and time">

      <label class="log-lab"><span id="t-logTargets">喷洒位置</span> <span class="log-req">*</span></label>
      <div id="logTargetList"></div>
      <button class="log-addtarget" id="logAddTarget"></button>

      <label class="log-lab"><span id="t-logWorkers">工人</span></label>
      <div class="chip-wrap" id="logWorkerChips"></div>

      <label class="log-lab" id="t-logMix">配方（快照）</label>
      <div class="log-mix" id="logMixPreview"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" id="logCancel"></button>
      <button class="modal-send log-save" id="logSave"></button>
    </div>
  </div>
</div>

<!-- reusable confirm dialog (reliable across browsers incl. iOS) -->
<div class="modal-ov" id="confirmModal" hidden>
  <div class="modal confirm-modal">
    <div class="modal-h" id="confirmMsg"></div>
    <div class="modal-btns">
      <button class="modal-cancel" id="confirmNo"></button>
      <button class="modal-send confirm-yes" id="confirmYes"></button>
    </div>
  </div>
</div>

<!-- add-target picker sub-sheet -->
<div class="modal-ov" id="targetSheet" hidden>
  <div class="modal">
    <div class="modal-h" id="t-targetTitle">选择位置</div>
    <div class="tp-crumb" id="targetCrumb"></div>
    <div class="log-body" id="targetPicker"></div>
    <div class="modal-btns">
      <button class="modal-cancel" id="targetCancel"></button>
    </div>
  </div>
</div>

<!-- History full-screen panel -->
<div class="panel" id="historyPanel" hidden>
  <div class="panel-head">
    <button class="icon-btn" id="historyBack" aria-label="Back">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h2 id="t-historyTitle">喷洒记录</h2>
    <button class="import-btn hist-export" id="historyExport"></button>
  </div>
  <div class="panel-body" id="historyList"></div>
</div>

<script>
"use strict";
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];

const STR={
  zh:{title:"农药记录",tank:"水箱容量",
    chems:"药剂",add:"添加药剂",recipe:"配方总览",share:"WhatsApp",reset:"清空",

let lang = localStorage.getItem("tm_lang")||"zh";

let state = load() || { tank:"", chems:[ blankChem() ] };
// normalize saved chems to the current shape (rate is a plain number; unit lives in rateUnit)
state.chems = (state.chems||[]).map(c=>{
  let rate = (c.rate!=null?String(c.rate):"");
  // strip any stray unit letters from rate (older builds stored e.g. "50ml")
  rate = rate.replace(/[^\d.]/g,"");
  return {
    id:c.id ?? (Date.now()+Math.random()),
    name:c.name||"", rate, rateUnit:c.rateUnit||"", pack:c.pack||"",
    mode:(c.mode||c.unit)==="ratio" ? "ratio" : "per_L",
    basis:(c.basis!=null?String(c.basis).replace(/[^\d.]/g,""):"")
  };
});
if(!state.chems.length) state.chems=[blankChem()];

function blankChem(){ return {id:Date.now()+Math.random(), name:"", rate:"", rateUnit:"", pack:"", mode:"per_L", basis:"" }; }
function load(){ try{return JSON.parse(localStorage.getItem("tm_state"))}catch(e){return null} }
function save(){ localStorage.setItem("tm_state",JSON.stringify(state)); }

// --- saved lists: farms (each with its own zones) + workers ---
function loadLists(){
  let d; try{ d=JSON.parse(localStorage.getItem("tm_lists")); }catch(e){ d=null; }
  d = d || {};
  const farms = (d.farms||[]).map(f=>({ id:f.id||newId(), name:f.name||"", deleted:f.deleted||undefined, zones:(f.zones||[]).map(z=>({
    id:z.id||newId(), name:z.name||"", deleted:z.deleted||undefined,
    tFrom:(z.tFrom!=null&&z.tFrom!==""?z.tFrom:"1"), tTo:(z.tTo!=null?z.tTo:""),
    hasRows:!!z.hasRows,
    rows:(z.rows||[]).map(r=>({id:r.id||newId(), name:r.name||"", deleted:r.deleted||undefined, tFrom:(r.tFrom!=null&&r.tFrom!==""?r.tFrom:"1"), tTo:(r.tTo!=null?r.tTo:"")}))
  })) }));
  return { farms, workers:(d.workers||[]).map(w=>({id:w.id||newId(), sid:w.sid||"", name:w.name||"", deleted:w.deleted||undefined})) };
}
function newId(){ return "id_"+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
let lists = loadLists();
function saveLists(){ localStorage.setItem("tm_lists", JSON.stringify(lists)); }

// --- application logs (spray events) ---
// each: {id, ts (created), when (ISO date+time of spraying), targets:[...], workers:[{sid,name}], tank, chems:[...], deleted?}
function loadLogs(){ try{ return JSON.parse(localStorage.getItem("tm_logs"))||[]; }catch(e){ return []; } }
let logs = loadLogs();
function saveLogs(){ localStorage.setItem("tm_logs", JSON.stringify(logs)); }
function logAdd(rec){ rec.id=newId(); rec.ts=nowTs(); logs.push(rec); saveLogs(); return rec; }
function logRemove(id){ const r=logs.find(x=>x.id===id); if(r){ r.deleted=nowTs(); saveLogs(); } }
function logRestore(id){ const r=logs.find(x=>x.id===id); if(r){ delete r.deleted; saveLogs(); } }
function aliveLogs(){ return logs.filter(x=>!x.deleted).slice().sort((a,b)=> (b.when||"").localeCompare(a.when||"") || b.ts-a.ts); }

// soft-delete helpers: items carry a `deleted` timestamp; alive() filters them out
function alive(arr){ return (arr||[]).filter(x=>!x.deleted); }
// natural sort: splits names into text/number chunks so A2 < A10, C1 < C2 < C10
function natCmp(a,b){
  const ax=String(a).toLowerCase().match(/(\d+|\D+)/g)||[];
  const bx=String(b).toLowerCase().match(/(\d+|\D+)/g)||[];
  const n=Math.min(ax.length,bx.length);
  for(let i=0;i<n;i++){
    const an=ax[i], bn=bx[i];
    const aNum=/^\d/.test(an), bNum=/^\d/.test(bn);
    if(aNum&&bNum){ const d=parseInt(an,10)-parseInt(bn,10); if(d) return d; }
    else if(an!==bn) return an<bn?-1:1;
  }
  return ax.length-bx.length;
}
// alive items sorted naturally by name
function aliveSorted(arr){ return alive(arr).slice().sort((a,b)=>natCmp(a.name,b.name)); }
function nowTs(){ return Date.now(); }

// farms
function farmAdd(name){
  const nm=(name||"").trim(); if(!nm) return null;
  if(alive(lists.farms).some(f=>f.name.toLowerCase()===nm.toLowerCase())) return null;
  const f={id:newId(), name:nm, zones:[]}; lists.farms.push(f); saveLists(); return f;
}
function farmRename(id,name){ const f=lists.farms.find(x=>x.id===id); if(f){ f.name=(name||"").trim(); saveLists(); } }
function farmRemove(id){ const f=lists.farms.find(x=>x.id===id); if(f){ f.deleted=nowTs(); saveLists(); } }
// zones (scoped to a farm)
function zoneAdd(farmId,name){
  const f=lists.farms.find(x=>x.id===farmId); if(!f) return null;
  const nm=(name||"").trim(); if(!nm) return null;
  if(alive(f.zones).some(z=>z.name.toLowerCase()===nm.toLowerCase())) return null;
  const z={id:newId(), name:nm, tFrom:"1", tTo:"", hasRows:false, rows:[]}; f.zones.push(z); saveLists(); return z;
}
function zoneRename(farmId,zoneId,name){ const f=lists.farms.find(x=>x.id===farmId); if(!f) return; const z=f.zones.find(x=>x.id===zoneId); if(z){ z.name=(name||"").trim(); saveLists(); } }
function zoneSetTrees(farmId,zoneId,from,to){
  const f=lists.farms.find(x=>x.id===farmId); if(!f) return; const z=f.zones.find(x=>x.id===zoneId); if(!z) return;
  z.tFrom=(from===""||from==null)?"":String(from).replace(/[^\d]/g,"");
  z.tTo=(to===""||to==null)?"":String(to).replace(/[^\d]/g,"");
  saveLists();
}
// count trees from a from/to pair (0 if invalid)
function rangeCount(from,to){
  const a=parseInt(from,10), b=parseInt(to,10);
  if(!(a>0)||!(b>0)||b<a) return 0;
  return b-a+1;
}
// tree count for a simple zone
function zoneTreeCount(z){ return rangeCount(z.tFrom, z.tTo); }
// total trees in a zone whether simple or row-based (alive rows only)
function zoneTotalTrees(z){
  if(z.hasRows) return alive(z.rows).reduce((s,r)=>s+rangeCount(r.tFrom,r.tTo),0);
  return zoneTreeCount(z);
}
function farmTotalTrees(f){ return alive(f.zones).reduce((s,z)=>s+zoneTotalTrees(z),0); }
function zoneRemove(farmId,zoneId){ const z=findZone(farmId,zoneId); if(z){ z.deleted=nowTs(); saveLists(); } }

// --- rows within a zone ---
function findZone(farmId,zoneId){ const f=lists.farms.find(x=>x.id===farmId); return f? f.zones.find(z=>z.id===zoneId):null; }
function zoneToggleRows(farmId,zoneId,on){ const z=findZone(farmId,zoneId); if(!z) return; z.hasRows=!!on; if(z.hasRows && !z.rows) z.rows=[]; saveLists(); }
function rowAdd(farmId,zoneId,name){
  const z=findZone(farmId,zoneId); if(!z) return null;
  const nm=(name||"").trim(); if(!nm) return null;
  if(alive(z.rows).some(r=>r.name.toLowerCase()===nm.toLowerCase())) return null;
  const r={id:newId(), name:nm, tFrom:"1", tTo:""}; (z.rows=z.rows||[]).push(r); saveLists(); return r;
}
function rowsBulkAdd(farmId,zoneId,names){
  const z=findZone(farmId,zoneId); if(!z) return 0; z.rows=z.rows||[];
  let added=0;
  names.forEach(nm=>{ nm=(nm||"").trim(); if(!nm) return;
    if(alive(z.rows).some(r=>r.name.toLowerCase()===nm.toLowerCase())) return;
    z.rows.push({id:newId(), name:nm, tFrom:"1", tTo:""}); added++;
  });
  if(added) saveLists(); return added;
}
function rowRename(farmId,zoneId,rowId,name){ const z=findZone(farmId,zoneId); if(!z) return; const r=(z.rows||[]).find(x=>x.id===rowId); if(r){ r.name=(name||"").trim(); saveLists(); } }
function rowRemove(farmId,zoneId,rowId){ const z=findZone(farmId,zoneId); if(!z) return; const r=(z.rows||[]).find(x=>x.id===rowId); if(r){ r.deleted=nowTs(); saveLists(); } }
function rowSetTrees(farmId,zoneId,rowId,from,to){
  const z=findZone(farmId,zoneId); if(!z) return; const r=(z.rows||[]).find(x=>x.id===rowId); if(!r) return;
  r.tFrom=(from===""||from==null)?"":String(from).replace(/[^\d]/g,"");
  r.tTo=(to===""||to==null)?"":String(to).replace(/[^\d]/g,"");
  saveLists();
}

// --- zone range generator ---
// spreadsheet-style letters: A=1 .. Z=26, AA=27 .. ZZ=702
function lettersToNum(s){
  s=s.toUpperCase(); let n=0;
  for(const ch of s){ if(ch<"A"||ch>"Z") return null; n=n*26+(ch.charCodeAt(0)-64); }
  return n;
}
function numToLetters(n){
  let s=""; while(n>0){ const r=(n-1)%26; s=String.fromCharCode(65+r)+s; n=Math.floor((n-1)/26); }
  return s;
}
const ZONE_GEN_MAX = 2000; // safety cap
// Expand "A-Z", "AA-ZZ", "1-50", "Zone 1-Zone 100" into a list of names.
// Returns {names:[...]} or {error:"..."}.
function expandZoneRange(input){
  const raw=(input||"").trim();
  if(!raw) return {error:"range"};
  const m=raw.split(/\s*[-–—~]\s*/);   // split on hyphen/dash/tilde
  // single name (no dash) -> just that one name
  if(m.length===1) return {names:[raw]};
  if(m.length!==2) return {error:"range"};
  let [a,b]=m.map(s=>s.trim());
  if(!a||!b) return {error:"range"};
  // capture an optional shared prefix + trailing number, e.g. "Zone 1" .. "Zone 100"
  const reNum=/^(.*?)(\d+)$/;
  const na=a.match(reNum), nb=b.match(reNum);
  let names=[];
  if(na && nb){                          // numeric range (with optional prefix)
    const prefixA=na[1], prefixB=nb[1];
    if(prefixA.toLowerCase()!==prefixB.toLowerCase()) return {error:"range"};
    let s=parseInt(na[2],10), e=parseInt(nb[2],10);
    if(s>e) [s,e]=[e,s];
    if(e-s+1>ZONE_GEN_MAX) return {error:"toobig"};
    for(let i=s;i<=e;i++) names.push(`${prefixA}${i}`);
  } else {                               // letter range
    let s=lettersToNum(a), e=lettersToNum(b);
    if(s==null||e==null) return {error:"range"};
    if(s>e) [s,e]=[e,s];
    if(e-s+1>ZONE_GEN_MAX) return {error:"toobig"};
    for(let i=s;i<=e;i++) names.push(numToLetters(i));
  }
  return {names};
}
// add many zones to a farm, skipping duplicates; returns count added
function zonesBulkAdd(farmId, names){
  const f=lists.farms.find(x=>x.id===farmId); if(!f) return 0;
  let added=0;
  names.forEach(nm=>{
    nm=(nm||"").trim(); if(!nm) return;
    if(f.zones.some(z=>z.name.toLowerCase()===nm.toLowerCase())) return;
    f.zones.push({id:newId(), name:nm, tFrom:"1", tTo:"", hasRows:false, rows:[]}); added++;
  });
  if(added) saveLists();
  return added;
}
// workers (flat) — each has a staff ID (sid, reusable) + name, plus a stable internal id
function workerSidTaken(sid, exceptId){
  const s=(sid||"").trim().toLowerCase(); if(!s) return false;
  return alive(lists.workers).some(w=> w.id!==exceptId && (w.sid||"").trim().toLowerCase()===s);
}
function workerAdd(sid, name){
  const s=(sid||"").trim().toUpperCase(), nm=(name||"").trim();
  if(!s && !nm) return null;
  if(s && workerSidTaken(s)) return {error:"dupe"};   // active staff ID clash
  const w={id:newId(), sid:s, name:nm}; lists.workers.push(w); saveLists(); return w;
}
function workerSetSid(id, sid){
  const w=lists.workers.find(x=>x.id===id); if(!w) return false;
  const s=(sid||"").trim().toUpperCase();
  if(s && workerSidTaken(s, id)) return false;         // reject clash, keep old value
  w.sid=s; saveLists(); return true;
}
function workerRename(id,name){ const w=lists.workers.find(x=>x.id===id); if(w){ w.name=(name||"").trim(); saveLists(); } }
function workerRemove(id){ const w=lists.workers.find(x=>x.id===id); if(w){ w.deleted=nowTs(); saveLists(); } }
// bulk import: rows of {sid,name}; skips clashes with active staff IDs; returns {added,skipped}
function workersBulkImport(rows){
  let added=0, skipped=0;
  rows.forEach(r=>{
    const s=(r.sid||"").trim().toUpperCase(), nm=(r.name||"").trim();
    if(!s && !nm) return;
    if(s && workerSidTaken(s)){ skipped++; return; }
    lists.workers.push({id:newId(), sid:s, name:nm}); added++;
  });
  if(added) saveLists();
  return {added, skipped};
}

// --- trash: collect, restore, purge (across farms/zones/rows/workers) ---
// returns a flat list of trashed items with enough context to restore/purge
function collectTrash(){
  const out=[];
  lists.farms.forEach(f=>{
    if(f.deleted){ out.push({type:"farm", label:f.name||"(farm)", ts:f.deleted, ref:{fid:f.id}, sub:trashSub(f)}); }
    (f.zones||[]).forEach(z=>{
      if(!f.deleted && z.deleted){ out.push({type:"zone", label:`${f.name} › ${z.name||"(zone)"}`, ts:z.deleted, ref:{fid:f.id,zid:z.id}, sub:trashSub(z)}); }
      (z.rows||[]).forEach(r=>{
        if(!f.deleted && !z.deleted && r.deleted){ out.push({type:"row", label:`${f.name} › ${z.name} › ${r.name||"(row)"}`, ts:r.deleted, ref:{fid:f.id,zid:z.id,rid:r.id}}); }
      });
    });
  });
  lists.workers.forEach(w=>{ if(w.deleted){ const lbl=w.sid?`[${w.sid}] ${w.name||""}`.trim():(w.name||"(worker)"); out.push({type:"worker", label:lbl, ts:w.deleted, ref:{wid:w.id}}); } });
  out.sort((a,b)=>b.ts-a.ts);
  return out;
}
function trashSub(item){
  // describe what rides along (zones/rows) so the user knows the scope
  if(item.zones){ const zc=item.zones.length, rc=item.zones.reduce((s,z)=>s+((z.rows||[]).length),0); return {zones:zc, rows:rc}; }
  if(item.rows){ return {rows:(item.rows||[]).length}; }
  return null;
}
function trashRestore(ref){
  if(ref.rid){ const z=findZone(ref.fid,ref.zid); const r=z&&(z.rows||[]).find(x=>x.id===ref.rid); if(r) delete r.deleted; }
  else if(ref.zid){ const z=findZone(ref.fid,ref.zid); if(z) delete z.deleted; }
  else if(ref.fid){ const f=lists.farms.find(x=>x.id===ref.fid); if(f) delete f.deleted; }
  else if(ref.wid){ const w=lists.workers.find(x=>x.id===ref.wid); if(w) delete w.deleted; }
  saveLists();
}
function trashPurge(ref){
  if(ref.rid){ const z=findZone(ref.fid,ref.zid); if(z) z.rows=(z.rows||[]).filter(x=>x.id!==ref.rid); }
  else if(ref.zid){ const f=lists.farms.find(x=>x.id===ref.fid); if(f) f.zones=(f.zones||[]).filter(x=>x.id!==ref.zid); }
  else if(ref.fid){ lists.farms=lists.farms.filter(x=>x.id!==ref.fid); }
  else if(ref.wid){ lists.workers=lists.workers.filter(x=>x.id!==ref.wid); }
  saveLists();
}
function trashPurgeAll(){
  lists.farms=lists.farms.filter(f=>!f.deleted);
  lists.farms.forEach(f=>{ f.zones=(f.zones||[]).filter(z=>!z.deleted); f.zones.forEach(z=>{ z.rows=(z.rows||[]).filter(r=>!r.deleted); }); });
  lists.workers=lists.workers.filter(w=>!w.deleted);
  saveLists();
}


function tankVol(){
  const v=parseFloat(state.tank); return (v>0)?v:0;
}

// Parse free-text rate like "500g", "1.5 kg", "500ml", "1L" (case-insensitive, space optional).
// Returns {num, family:'mass'|'vol', baseUnit:'g'|'ml', baseVal (g or ml)} or null.
function parseRate(txt){
  if(txt==null) return null;
  const m = String(txt).trim().match(/^([\d.]+)\s*(kg|g|ml|l)?$/i);
  if(!m || !(parseFloat(m[1])>0)) return null;
  const num = parseFloat(m[1]);
  const u = (m[2]||"").toLowerCase();
  // default to ml (liquid) when no unit typed
  switch(u){
    case "kg": return {num, family:"mass", baseUnit:"g",  baseVal:num*1000};
    case "g":  return {num, family:"mass", baseUnit:"g",  baseVal:num};
    case "l":  return {num, family:"vol",  baseUnit:"ml", baseVal:num*1000};
    case "ml":
    default:   return {num, family:"vol",  baseUnit:"ml", baseVal:num};
  }
}

// The package determines the unit family. The rate field is a plain NUMBER only.
// returns {base, baseUnit, disp, dispUnit, family, ok, needPack} for the whole tank
function calcChem(c){
  const V=tankVol();
  if(!V) return {ok:false};
  const pk = parseRate(c.pack);          // package is the single source of truth for the family
  if(!pk) return {ok:false, needPack:true};
  const family  = pk.family;             // 'mass' (g) or 'vol' (ml)
  const baseUnit = family==="mass" ? "g" : "ml";
  const N = parseFloat(c.rate);
  if(!(N>0)) return {ok:false};
  let base;
  if(c.mode==="ratio"){                  // 1 : N  (product : water)
    base = (V/N)*1000;                   // g or ml of product for the whole tank
  } else {                               // amount (in chosen unit) per (basis) litres of water
    const basis = parseFloat(c.basis);
    if(!(basis>0)) return {ok:false, needBasis:true};   // require an explicit per-litres value
    // convert the entered amount to base units (g or ml) using the chosen rate unit
    const unit = c.rateUnit || (family==="mass"?"g":"ml");
    const toBase = (unit==="kg"||unit==="l") ? 1000 : 1;
    const amountBase = N * toBase;       // amount per `basis` litres, in base units
    base = amountBase * (V/basis);       // scale to the whole tank
  }
  const d = scaleUnit(base, family);
  const packs = base / pk.baseVal;       // exact bags/bottles; family always matches now
  return {ok:true, base, baseUnit, disp:d.val, dispUnit:d.unit, family, packs, packMismatch:false};
}

// ml -> L past 1000 ; g -> kg past 1000
function scaleUnit(amount, family){
  if(family==="mass") return amount>=1000 ? {val:amount/1000, unit:"kg"} : {val:amount, unit:"g"};
  return amount>=1000 ? {val:amount/1000, unit:"L"} : {val:amount, unit:"ml"};
}

function fmt(n){
  if(!isFinite(n)) return "–";
  if(n>=1000) return Math.round(n).toLocaleString();
  if(n>=100) return (Math.round(n*10)/10).toLocaleString();
  if(n>=1) return (Math.round(n*100)/100).toLocaleString();
  return (Math.round(n*1000)/1000).toLocaleString();
}

// updates only the "per tank" result line of one card, preserving input focus
function updateResult(card,c){
  const res=calcChem(c);
  const val=card.querySelector(".result .val");
  const sub=card.querySelector(".result .sub");
  const pks=card.querySelector(".result .packs");
  if(!val) return;
  if(res.ok){
    val.innerHTML = `${fmt(res.disp)} <small>${res.dispUnit}</small>`;
    val.className = "val";
    sub.textContent = "";
  } else if(res.needPack){
    val.innerHTML = `<span class="need-pack">${STR[lang].needPackMsg}</span>`;
    val.className = "val"; sub.textContent="";
  } else if(res.needBasis){
    val.innerHTML = `<span class="need-pack">${STR[lang].needBasisMsg}</span>`;
    val.className = "val"; sub.textContent="";
  } else {
    val.textContent = "–"; val.className="val bad"; sub.textContent="";
  }
  if(pks) pks.innerHTML = packLine(res, STR[lang]);
}

// "Need 2 bags/bottles" / pack-mismatch warning / empty when no pack entered
function packLine(res, S){
  if(!res || !res.ok) return "";
  if(res.packMismatch) return `<span class="pack-warn">${S.packMismatch}</span>`;
  if(res.packs==null) return "";
  const unit = res.family==="mass" ? S.bagUnit : S.bottleUnit;
  return `${S.packNeed} <b>${fmt(res.packs)}</b> ${unit}`;
}

// parse xlsx/xls/csv -> [{sid,name}]; expects two columns (Staff ID, Name), header optional
async function parseWorkerFile(file){
  const name=file.name.toLowerCase();
  let matrix=[];
  if(name.endsWith(".csv")){
    const text=await file.text();
    matrix=text.split(/\r?\n/).filter(l=>l.trim()!=="").map(l=>splitCsvLine(l));
  }else{
    const XLSX=await loadSheetJS();
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    matrix=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false});
  }
  // drop a header row if it looks like labels (non-numeric-ish first cell containing "id"/"name"/staff)
  if(matrix.length){
    const h=(matrix[0]||[]).map(c=>String(c==null?"":c).toLowerCase());
    if(h.some(c=>/id|name|staff|工号|姓名|员工/.test(c))) matrix=matrix.slice(1);
  }
  return matrix.map(r=>({ sid:String(r[0]==null?"":r[0]).trim(), name:String(r[1]==null?"":r[1]).trim() }))
               .filter(r=>r.sid||r.name);
}
function splitCsvLine(line){
  const out=[]; let cur="", q=false;
  for(let i=0;i<line.length;i++){ const c=line[i];
    if(q){ if(c==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c===','){ out.push(cur); cur=""; } else if(c==='"'){ q=true; } else cur+=c; }
  }
  out.push(cur); return out.map(s=>s.trim());
}
let _sheetjs=null;
function loadSheetJS(){
  if(_sheetjs) return _sheetjs;
  _sheetjs=new Promise((resolve,reject)=>{
    if(window.XLSX){ resolve(window.XLSX); return; }
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload=()=>window.XLSX?resolve(window.XLSX):reject(new Error("XLSX load failed"));
    s.onerror=()=>reject(new Error("XLSX load failed"));
    document.head.appendChild(s);
  });
  return _sheetjs;
}

const zoneOpen = new Set();   // farm ids whose zone list is expanded (per session)
const zoneDetailOpen = new Set();   // zone ids whose detail (rows/tree range) is expanded

// build one zone row: simple tree range, or a rows sub-section
function zoneRowHTML(f,z,S){
  const total=zoneTotalTrees(z);
  const treeUI = z.hasRows
    ? rowsSectionHTML(z,S,total)
    : `<div class="zone-trees">
         <span class="zt-lab">${S.treesLab}</span>
         <input class="zt-from" name="treeFrom" aria-label="${S.ariaTreeFrom}" inputmode="numeric" type="text" value="${esc(z.tFrom)}">
         <span class="zt-dash">–</span>
         <input class="zt-to" name="treeTo" aria-label="${S.ariaTreeTo}" inputmode="numeric" type="text" value="${esc(z.tTo)}">
         <span class="zt-count">${zoneTreeCount(z)?S.treesCount(zoneTreeCount(z)):""}</span>
       </div>`;
  const open = zoneDetailOpen.has(z.id);
  // compact summary shown on the header line so a collapsed zone is still informative
  const summary = z.hasRows
    ? S.zoneSummaryRows(alive(z.rows).length, total)
    : (zoneTreeCount(z)? S.treesCount(zoneTreeCount(z)) : S.zoneNoTrees);

function rowsSectionHTML(z,S,total){
  const rowsHTML=aliveSorted(z.rows).map(r=>{
    const rc=rangeCount(r.tFrom,r.tTo);

function renderFarmList(){
  const S=STR[lang], host=$("#farmList"); host.innerHTML="";

  if(!farms.length){
    const e=document.createElement("div"); e.className="ent-empty"; e.textContent=S.noFarms;
    host.appendChild(e); return;
  }
  farms.forEach(f=>{
    const card=document.createElement("div"); card.className="farm-card";
    const zoneRows = aliveSorted(f.zones).map(z=>zoneRowHTML(f,z,S)).join("");
    const expanded = zoneOpen.has(f.id);
    const zc = alive(f.zones).length;
    card.innerHTML=`
      <div class="ent-row farm-row">
        <input class="ent-name" name="entName" aria-label="${S.ariaFarmName||'Farm name'}" value="${esc(f.name)}">
        <button class="ent-del" aria-label="delete">🗑</button>
      </div>
      <div class="zones">
        ${zc ? `<button class="zone-toggle ${expanded?'open':''}" aria-expanded="${expanded}">
          <span class="ztg-caret"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
          <span class="ztg-label">${S.zonesCount(zc, farmTotalTrees(f))}</span>

        <div class="zone-rows" ${expanded?'':'hidden'}>${zoneRows}</div>`
        : `<div class="zone-empty">${S.noZones}</div>`}
        <div class="zone-gen-row">
          <input class="zone-gen" name="zoneGen" aria-label="${S.ariaZoneGen}" type="text" placeholder="${S.zoneGenPh}">
          <button class="zone-genbtn">${S.zoneAddBtn}</button>
        </div>
        <div class="zone-gen-hint"></div>
      </div>`;
    // farm rename / delete
    card.querySelector(".farm-row .ent-name").onchange=e=>{ farmRename(f.id, e.target.value); };
    card.querySelector(".farm-row .ent-del").onclick=()=>{ farmRemove(f.id); zoneOpen.delete(f.id); renderSettings(); };
    // zone list collapse/expand
    const toggle=card.querySelector(".zone-toggle");
    if(toggle){
      toggle.onclick=()=>{
        if(zoneOpen.has(f.id)) zoneOpen.delete(f.id); else zoneOpen.add(f.id);
        const rows=card.querySelector(".zone-rows");
        const open=zoneOpen.has(f.id);
        rows.hidden=!open; toggle.classList.toggle("open",open); toggle.setAttribute("aria-expanded",open);
      };
    }
    // zone generator (handles single names AND ranges)
    const gi=card.querySelector(".zone-gen");
    const ghint=card.querySelector(".zone-gen-hint");
    const previewGen=()=>{
      const v=gi.value.trim();
      if(!v){ ghint.textContent=""; ghint.className="zone-gen-hint"; return; }
      const r=expandZoneRange(v);
      if(r.error==="toobig"){ ghint.textContent=S.zoneGenTooBig; ghint.className="zone-gen-hint err"; return; }
      if(r.error){ ghint.textContent=S.zoneGenBad; ghint.className="zone-gen-hint err"; return; }
      // count how many are new (not already present)
      const newCount=r.names.filter(nm=>!alive(f.zones).some(z=>z.name.toLowerCase()===nm.toLowerCase())).length;
      const first=r.names[0], last=r.names[r.names.length-1];
      // single name: simpler hint
      ghint.textContent = r.names.length===1
        ? (newCount? S.zoneAddOne(first) : S.zoneDupOne(first))
        : `${S.zoneGenPreview(r.names.length,newCount)} (${first} … ${last})`;
      ghint.className="zone-gen-hint ok";
    };
    gi.oninput=previewGen;
    const doGen=()=>{
      const r=expandZoneRange(gi.value.trim());
      if(!r.names){ previewGen(); return; }
      const added=zonesBulkAdd(f.id, r.names);
      if(added) zoneOpen.add(f.id);   // auto-expand so new zones are visible
      gi.value=""; renderFarmList();
      setTimeout(()=>{ const fc=[...$$(".farm-card")].find(el=>el.querySelector(".farm-row .ent-name").value===f.name);
        fc && fc.querySelector(".zone-gen") && fc.querySelector(".zone-gen").focus(); },0);
    };
    card.querySelector(".zone-genbtn").onclick=doGen;
    gi.addEventListener("keydown",e=>{ if(e.key==="Enter") doGen(); });
    // zone rename / delete / rows-toggle / tree range / row handlers
    card.querySelectorAll(".zone-row").forEach(zr=>{
      const zid=zr.dataset.zid;
      // caret: expand/collapse this zone's detail in place
      const caret=zr.querySelector(".zone-caret");
      if(caret) caret.onclick=()=>{
        const detail=zr.querySelector(".zone-detail");
        const sumEl=zr.querySelector(".zone-sum");
        if(zoneDetailOpen.has(zid)){
          zoneDetailOpen.delete(zid); detail.hidden=true; caret.classList.remove("open"); caret.setAttribute("aria-expanded","false");
          // refresh the collapsed summary from current data
          const z=findZone(f.id,zid);
          if(z && sumEl){ sumEl.textContent = z.hasRows ? S.zoneSummaryRows(alive(z.rows).length, zoneTotalTrees(z)) : (zoneTreeCount(z)?S.treesCount(zoneTreeCount(z)):S.zoneNoTrees); }
        } else {
          zoneDetailOpen.add(zid); detail.hidden=false; caret.classList.add("open"); caret.setAttribute("aria-expanded","true");
        }
      };
      zr.querySelector(".zone-name").onchange=e=>{ zoneRename(f.id, zid, e.target.value); };
      zr.querySelector(".zone-del").onclick=()=>{ zoneRemove(f.id, zid); renderSettings(); };
      // rows on/off toggle
      const chk=zr.querySelector(".rows-chk");
      if(chk) chk.onchange=e=>{ zoneToggleRows(f.id, zid, e.target.checked); zoneDetailOpen.add(zid); renderFarmList(); };
      // simple-zone tree range (only present when not hasRows)
      const zfrom=zr.querySelector(".zone-trees .zt-from"), zto=zr.querySelector(".zone-trees .zt-to"), zcount=zr.querySelector(".zone-trees .zt-count");
      if(zfrom && zto){
        const onTrees=()=>{
          zfrom.value=zfrom.value.replace(/[^\d]/g,""); zto.value=zto.value.replace(/[^\d]/g,"");
          zoneSetTrees(f.id, zid, zfrom.value, zto.value);
          const z=findZone(f.id,zid), tc=zoneTreeCount(z);
          zcount.textContent = tc?S.treesCount(tc):""; const bad=(zfrom.value&&zto.value&&tc===0);
          zcount.classList.toggle("err", !!bad); if(bad) zcount.textContent=S.treesBad;
        };
        zfrom.oninput=onTrees; zto.oninput=onTrees;
      }
      // rows sub-section (only present when hasRows)
      const rlist=zr.querySelector(".row-list");
      if(rlist){
        rlist.querySelectorAll(".row-row").forEach(rr=>{
          const rid=rr.dataset.rid;
          rr.querySelector(".row-name").onchange=e=>{ rowRename(f.id, zid, rid, e.target.value); };
          rr.querySelector(".row-del").onclick=()=>{ rowRemove(f.id, zid, rid); renderSettings(); };
          const rf=rr.querySelector(".rt-from"), rt=rr.querySelector(".rt-to"), rc=rr.querySelector(".rt-count");
          const onRowTrees=()=>{
            rf.value=rf.value.replace(/[^\d]/g,""); rt.value=rt.value.replace(/[^\d]/g,"");
            rowSetTrees(f.id, zid, rid, rf.value, rt.value);
            const cnt=rangeCount(rf.value, rt.value);
            rc.textContent = cnt?S.treesCount(cnt):""; const bad=(rf.value&&rt.value&&cnt===0);
            rc.classList.toggle("err", !!bad); if(bad) rc.textContent=S.treesBad;
            // update the zone total live
            const tot=zr.querySelector(".rows-total"); const z=findZone(f.id,zid);
            if(tot) tot.textContent=S.rowsTotal(alive(z.rows).length, zoneTotalTrees(z));
          };
          rf.oninput=onRowTrees; rt.oninput=onRowTrees;
        });
        // row generator (handles single names AND ranges)
        const rgi=zr.querySelector(".row-gen"), rghint=zr.querySelector(".row-gen-hint");
        const z=findZone(f.id,zid);
        const previewRows=()=>{
          const v=rgi.value.trim();
          if(!v){ rghint.textContent=""; rghint.className="row-gen-hint"; return; }
          const r=expandZoneRange(v);
          if(r.error==="toobig"){ rghint.textContent=S.zoneGenTooBig; rghint.className="row-gen-hint err"; return; }
          if(r.error){ rghint.textContent=S.zoneGenBad; rghint.className="row-gen-hint err"; return; }
          const newCount=r.names.filter(nm=>!alive(z.rows).some(x=>x.name.toLowerCase()===nm.toLowerCase())).length;
          rghint.textContent = r.names.length===1
            ? (newCount? S.zoneAddOne(r.names[0]) : S.zoneDupOne(r.names[0]))
            : `${S.zoneGenPreview(r.names.length,newCount)} (${r.names[0]} … ${r.names[r.names.length-1]})`;
          rghint.className="row-gen-hint ok";
        };
        rgi.oninput=previewRows;
        const doRowGen=()=>{ const r=expandZoneRange(rgi.value.trim()); if(!r.names){ previewRows(); return; }
          rowsBulkAdd(f.id, zid, r.names); rgi.value=""; renderFarmList(); };
        zr.querySelector(".row-genbtn").onclick=doRowGen;
        rgi.addEventListener("keydown",e=>{ if(e.key==="Enter") doRowGen(); });
      }
    });
    host.appendChild(card);
  });
}

function buildShareText(){
  const S=STR[lang], V=tankVol();
  const vStr = V?`${fmt(V)} L`:"—";
  const lines=[];
  lines.push(`${S.recipe}`);                // plain header (no volume)
  lines.push("");
  let any=false;
  state.chems.forEach(c=>{
    const res=calcChem(c);
    if(!res.ok) return; any=true;
    const nm = c.name?.trim() || (lang==="zh"?"未命名药剂":"Unnamed");
    let line = `• ${nm}: ${fmt(res.disp)} ${res.dispUnit}`;
    if(res.packs!=null && !res.packMismatch){
      const unit = res.family==="mass" ? S.bagUnit : S.bottleUnit;
      line += ` (${fmt(res.packs)} ${unit})`;
    }
    lines.push(line);
  });
  if(!any) lines.push(lang==="zh"?"（未输入药剂）":"(no chemicals)");
  lines.push("");
  lines.push(`${S.water}: ${vStr}`);
  lines.push("");
  lines.push(lang==="zh"?"用量仅供参考，请以标签为准。":"Reference only — always follow the label.");
  return lines.join("\n");
}

function pad2(n){ return String(n).padStart(2,"0"); }
function nowLocalInput(){
  const d=new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}
function mixSnapshot(){
  const V=tankVol(); const chems=[];
  state.chems.forEach(c=>{
    const res=calcChem(c); if(!res.ok) return;
    chems.push({
      name:(c.name||"").trim(), pack:(c.pack||"").trim(),
      mode:c.mode, rate:String(c.rate||""), basis:String(c.basis||"1"),
      disp:res.disp, dispUnit:res.dispUnit,
      packs:(res.packs!=null&&!res.packMismatch)?res.packs:null,
      packUnit:res.family==="mass"?STR[lang].bagUnit:STR[lang].bottleUnit
    });
  });
  return { tank:V||"", chems };
}

function targetLabel(t){
  const S=STR[lang];
  const f=lists.farms.find(x=>x.id===t.fid); if(!f) return "?";
  if(t.kind==="farm") return `${f.name} · ${S.entireFarm}`;
  const z=(f.zones||[]).find(x=>x.id===t.zid);
  const zoneN = z ? `${S.zonePrefix}${z.name}` : "?";
  if(t.kind==="zone") return `${f.name} › ${zoneN}`;
  if(t.kind==="row"){ const r=z&&(z.rows||[]).find(x=>x.id===t.rid); return `${f.name} › ${zoneN} › ${r?S.rowPrefix+r.name:"?"}`; }
  if(t.kind==="trees"){
    const r=z&&(z.rows||[]).find(x=>x.id===t.rid);
    const base=`${f.name} › ${zoneN}${r?` › ${S.rowPrefix}${r.name}`:""}`;
    const span = (t.from===t.to) ? `${S.treeShort}${t.from}` : `${S.treeShort}${t.from}–${t.to}`;
    return `${base} · ${span}`;
  }
  return "?";
}

}

  const wLabel=w=> w.sid?`${w.sid} · ${w.name}`:w.name;
  const toggle=id=>{ if(logDraft.workerIds.has(id)) logDraft.workerIds.delete(id); else logDraft.workerIds.add(id); renderLogWorkers(); };

  if(ws.length<=10){
